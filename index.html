<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <svg class="hero-scene" viewBox="0 0 800 260" preserveAspectRatio="none" aria-hidden="true">
    <!-- sky sun -->
    <circle cx="700" cy="50" r="34" fill="var(--amber-light)"/>
    <g stroke="var(--amber-light)" stroke-width="5" stroke-linecap="round">
      <line x1="700" y1="0" x2="700" y2="-6"/>
      <line x1="742" y1="14" x2="748" y2="9"/>
      <line x1="758" y1="50" x2="766" y2="50"/>
    </g>

    <!-- distant volcano -->
    <path d="M40 170 L100 90 L160 170 Z" fill="var(--fern-light)" opacity="0.55"/>
    <circle cx="100" cy="88" r="7" fill="var(--clay)" opacity="0.7"/>

    <!-- rolling ground -->
    <path d="M0 190 Q200 150 400 190 T800 190 V260 H0 Z" fill="var(--leaf)" opacity="0.4"/>
    <path d="M0 215 Q200 180 400 215 T800 215 V260 H0 Z" fill="var(--fern-light)" opacity="0.65"/>
    <path d="M0 235 Q200 205 400 235 T800 235 V260 H0 Z" fill="var(--fern)"/>

    <!-- ferns -->
    <g fill="var(--leaf)">
      <path d="M60 235 Q50 210 30 200 Q55 205 65 225 Q70 205 90 195 Q78 215 75 235 Z"/>
      <path d="M730 235 Q720 210 700 200 Q725 205 735 225 Q740 205 760 195 Q748 215 745 235 Z"/>
    </g>

    <!-- friendly dinosaur -->
    <g class="hero-dino">
      <!-- tail -->
      <path d="M690 200 Q745 195 760 175" stroke="var(--fern)" stroke-width="20" stroke-linecap="round" fill="none"/>
      <!-- body -->
      <ellipse cx="610" cy="192" rx="82" ry="48" fill="var(--fern)"/>
      <ellipse cx="610" cy="208" rx="52" ry="24" fill="var(--leaf)" opacity="0.55"/>
      <!-- legs -->
      <rect x="565" y="220" width="18" height="30" rx="9" fill="var(--fern)"/>
      <rect x="635" y="220" width="18" height="30" rx="9" fill="var(--fern)"/>
      <ellipse cx="574" cy="252" rx="14" ry="7" fill="var(--fern-light)"/>
      <ellipse cx="644" cy="252" rx="14" ry="7" fill="var(--fern-light)"/>
      <!-- back spikes -->
      <g fill="var(--spike)">
        <polygon points="540,152 550,130 560,152"/>
        <polygon points="565,148 575,122 585,148"/>
        <polygon points="592,146 602,118 612,146"/>
        <polygon points="619,148 629,122 639,148"/>
        <polygon points="645,152 655,130 665,152"/>
      </g>
      <!-- neck + head -->
      <path d="M550 175 Q525 120 520 85" stroke="var(--fern)" stroke-width="32" stroke-linecap="round" fill="none"/>
      <ellipse cx="516" cy="76" rx="28" ry="22" fill="var(--fern)"/>
      <circle cx="522" cy="70" r="9" fill="#fff"/>
      <circle cx="524" cy="71" r="4.5" fill="var(--ink)"/>
      <path d="M498 82 Q508 90 518 84" stroke="var(--ink)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
  </svg>
  <div class="hero-content">
    <p class="eyebrow" id="eyebrow-text">You're invited</p>
    <h1 class="headline" id="headline-text">It's a birthday!</h1>
    <p class="tagline" id="tagline-text"></p>
    <a href="#rsvp" class="btn">RSVP now</a>
  </div>
</header>

<div class="footprints" id="fp-1" aria-hidden="true">
  <svg viewBox="0 0 24 24"><path d="M12 2c2 0 3 2 3 4s-1 4-3 4-3-2-3-4 1-4 3-4zm-6 9c1.5 0 2.5 1.5 2.5 3.5S7.5 19 6 19s-2.5-1.5-2.5-4.5S4.5 11 6 11zm12 0c1.5 0 2.5 2 2.5 4.5S19.5 19 18 19s-2.5-1.5-2.5-4.5S16.5 11 18 11z"/></svg>
  <svg viewBox="0 0 24 24"><path d="M12 2c2 0 3 2 3 4s-1 4-3 4-3-2-3-4 1-4 3-4zm-6 9c1.5 0 2.5 1.5 2.5 3.5S7.5 19 6 19s-2.5-1.5-2.5-4.5S4.5 11 6 11zm12 0c1.5 0 2.5 2 2.5 4.5S19.5 19 18 19s-2.5-1.5-2.5-4.5S16.5 11 18 11z"/></svg>
</div>

<main class="container">

  <section id="details">
    <h2 class="section-title">Party details</h2>
    <div class="details-grid">
      <div class="detail-card">
        <div class="icon">📅</div>
        <h3>Date</h3>
        <p id="detail-date"></p>
      </div>
      <div class="detail-card">
        <div class="icon">🕐</div>
        <h3>Time</h3>
        <p id="detail-time"></p>
      </div>
      <div class="detail-card">
        <div class="icon">📍</div>
        <h3>Location</h3>
        <p id="detail-location"></p>
        <p class="form-note" id="detail-location-note"></p>
      </div>
    </div>
  </section>

  <div class="footprints" id="fp-2" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M12 2c2 0 3 2 3 4s-1 4-3 4-3-2-3-4 1-4 3-4zm-6 9c1.5 0 2.5 1.5 2.5 3.5S7.5 19 6 19s-2.5-1.5-2.5-4.5S4.5 11 6 11zm12 0c1.5 0 2.5 2 2.5 4.5S19.5 19 18 19s-2.5-1.5-2.5-4.5S16.5 11 18 11z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M12 2c2 0 3 2 3 4s-1 4-3 4-3-2-3-4 1-4 3-4zm-6 9c1.5 0 2.5 1.5 2.5 3.5S7.5 19 6 19s-2.5-1.5-2.5-4.5S4.5 11 6 11zm12 0c1.5 0 2.5 2 2.5 4.5S19.5 19 18 19s-2.5-1.5-2.5-4.5S16.5 11 18 11z"/></svg>
  </div>

  <section id="gallery">
    <h2 class="section-title">Past adventures</h2>
    <div id="gallery-grid" class="gallery-grid"></div>
    <p class="gallery-status" id="gallery-status"></p>
    <div style="text-align:center; margin-top:16px;">
      <button type="button" id="shuffle-btn" class="btn btn-secondary" style="display:none;">Shuffle photos</button>
    </div>
  </section>

  <div class="footprints" id="fp-3" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M12 2c2 0 3 2 3 4s-1 4-3 4-3-2-3-4 1-4 3-4zm-6 9c1.5 0 2.5 1.5 2.5 3.5S7.5 19 6 19s-2.5-1.5-2.5-4.5S4.5 11 6 11zm12 0c1.5 0 2.5 2 2.5 4.5S19.5 19 18 19s-2.5-1.5-2.5-4.5S16.5 11 18 11z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M12 2c2 0 3 2 3 4s-1 4-3 4-3-2-3-4 1-4 3-4zm-6 9c1.5 0 2.5 1.5 2.5 3.5S7.5 19 6 19s-2.5-1.5-2.5-4.5S4.5 11 6 11zm12 0c1.5 0 2.5 2 2.5 4.5S19.5 19 18 19s-2.5-1.5-2.5-4.5S16.5 11 18 11z"/></svg>
  </div>

  <section id="rsvp">
    <h2 class="section-title">RSVP</h2>
    <div class="rsvp-card">
      <p class="form-note" id="rsvp-deadline-note" style="margin-bottom:20px;"></p>
      <form id="rsvp-form">
        <div class="field">
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="field">
          <label>Will you be joining us?</label>
          <div class="radio-row">
            <label><input type="radio" name="attending" value="Yes" required> Yes</label>
            <label><input type="radio" name="attending" value="No" required> No</label>
          </div>
        </div>
        <div class="field">
          <label for="guests">Number of guests (including you)</label>
          <input type="number" id="guests" name="guests" min="1" value="1">
        </div>
        <div class="field">
          <label for="message">Allergies, notes, or a message</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <p class="form-note" id="rsvp-extra-note"></p>
        <button type="submit" class="btn" id="submit-btn">Send RSVP</button>
        <p class="form-status" id="form-status"></p>
      </form>
    </div>
  </section>

</main>

<footer>
  <p>Made with 🦕 for <span id="footer-name"></span>'s birthday.</p>
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
